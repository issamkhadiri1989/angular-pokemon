<div
  class="card pokemon-card text-center my-2"
  [class.active]="selected"
  style="border-radius: 16px; overflow: hidden; cursor: pointer; transition: transform 0.2s"
  (click)="onSelectPokemon()"
>
  <!-- <i
    class="fa-solid fa-star"
    style="position: absolute; top: 8px; left: 8px; color: gold; font-size: 18px"
  ></i> -->

  @if (isFavorite) {
  <span (click)="addToFavorite()">
    <i
    class="fa-solid fa-star"
    style="position: absolute; top: 8px; left: 8px; color: gold; font-size: 18px"
  ></i>
  </span>
  } @else {
<span (click)="addToFavorite()">
    <i
    class="fa-regular fa-star"
    style="position: absolute; top: 8px; left: 8px; font-size: 18px"
  ></i>
  </span>
  }


  <div class="card-img-top p-3" style="background: linear-gradient(135deg, #f0f4ff, #e8f5e9)">
    <img
      [src]="monster.img"
      [alt]="monster.name"
      style="width: 110px; height: 110px; object-fit: contain"
    />
  </div>
  <div class="card-body py-2 px-3">
    <small class="text-muted" style="font-family: monospace">#{{ monster.id }}</small>
    <h6 class="card-title mb-1 mt-1">{{ monster.name }}</h6>
    <span class="badge rounded-pill" [style]="typeStyle">{{ pokemonType }} </span>
  </div>
</div>
